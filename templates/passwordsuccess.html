{% extends "base.html" %}

{% block content %}

<div class="breadcrumb">
    <a href="/" class="breadcrumb-home">Trang chủ</a>
    <span class="breadcrumb-separator">></span>
    <a href="/forgetpassword" class="breadcrumb-home">Quên mật khẩu</a>
    <span class="breadcrumb-separator">></span>
    <span class="breadcrumb-current">Đổi mật khẩu thành công</span>
</div>

<div class="signin-wrapper">

    <div class="signin-card success-card">

        <img
            src="{{ url_for('static', filename='img/success.png') }}"
            class="success-icon"
            alt="Success Icon">

        <h1 class="success-title">Đổi mật khẩu thành công</h1>

        <p class="success-subtitle">
            Mật khẩu của bạn đã được cập nhật. Bây giờ bạn có thể đăng nhập bằng mật khẩu mới.
        </p>

        <a href="/signin" class="success-btn">
            Xác nhận
        </a>

        <div class="success-line"></div>

        <div class="success-secured">
            <img
                src="{{ url_for('static', filename='img/shield.png') }}"
                class="secured-icon"
                alt="Shield">
            <p>ACCOUNT SECURED BY TECHNOVA VAULT</p>
        </div>

    </div>

</div>

{% endblock %}
