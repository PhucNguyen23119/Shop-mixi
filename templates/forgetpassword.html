{% extends "base.html" %}

{% block content %}

<div class="breadcrumb">
    <a href="/" class="breadcrumb-home">Trang chủ</a>
    <span class="breadcrumb-separator">></span>
    <span class="breadcrumb-current">Quên mật khẩu</span>
</div>

<div class="signin-wrapper">

    <form class="signin-card forgot-card" method="POST" id="forgotForm" novalidate>

        <a href="/signin" class="back-btn">
            <img
                src="{{ url_for('static', filename='img/arrow-left.png') }}"
                class="back-arrow"
                alt="Back">
        </a>

        <img
            src="{{ url_for('static', filename='img/key.png') }}"
            class="forgot-key-icon"
            alt="Key Icon">

        <h1 class="forgot-title">Quên mật khẩu</h1>

        <p class="forgot-subtitle">
            Vui lòng nhập Email hoặc Số điện thoại đã đăng ký để lấy lại mật khẩu.
        </p>

        <div class="forgot-group">
            <label>Nhập số điện thoại hoặc Email</label>

            <input
                type="text"
                id="forgotLoginInput"
                name="login_input"
                value="{{ request.form.get('login_input', '') }}"
                placeholder="example@email.com"
                tabindex="1">
        </div>

        {% if error_message %}
        <div class="reset-error" style="display:flex;">
            <span>ⓘ</span>
            <p>{{ error_message }}</p>
        </div>
        {% endif %}

        <button type="submit" class="forgot-btn" id="forgotSubmit" tabindex="2">
            Tiếp tục
        </button>

        <div class="forgot-line"></div>

        <div class="forgot-login">
            <span>← Bạn đã nhớ mật khẩu?</span>
            <a href="/signin">Đăng nhập ngay</a>
        </div>

    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const forgotForm = document.getElementById("forgotForm");

    window.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;

        const activeElement = document.activeElement;

        if (!activeElement) return;

        if (activeElement.tagName === "TEXTAREA") {
            return;
        }

        if (activeElement.tagName === "A") {
            return;
        }

        if (activeElement.tagName === "BUTTON") {
            e.preventDefault();
            activeElement.click();
            return;
        }

        e.preventDefault();

        if (forgotForm) {
            forgotForm.requestSubmit();
        }
    });
});
</script>

{% endblock %}
