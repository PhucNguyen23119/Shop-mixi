{% extends "base.html" %} {% block title %}Sửa sản phẩm{% endblock %} {% block
content %}
<div class="admin-page admin-form-page">
  <div class="admin-title-row">
    <div>
      <h1>Sửa sản phẩm</h1>
      <p>Cập nhật thông tin sản phẩm trong hệ thống.</p>
    </div>

    <a href="/admin/products" class="admin-btn gray">← Quay lại</a>
  </div>

  <form method="POST" class="admin-section admin-product-form">
    <div class="admin-form-grid">
      <div class="admin-field">
        <label>Tên sản phẩm</label>
        <input name="name" required value="{{ product.name }}" />
      </div>

      <div class="admin-field">
        <label>Thương hiệu</label>
        <input name="brand" required value="{{ product.brand }}" />
      </div>

      <div class="admin-field">
        <label>Danh mục</label>
        <select name="category" required>
          {% if product.category == 'phone' %}
          <option value="phone" selected>Điện thoại</option>
          {% else %}
          <option value="phone">Điện thoại</option>
          {% endif %} {% if product.category == 'tablet' %}
          <option value="tablet" selected>Máy tính bảng</option>
          {% else %}
          <option value="tablet">Máy tính bảng</option>
          {% endif %} {% if product.category == 'laptop' %}
          <option value="laptop" selected>Laptop</option>
          {% else %}
          <option value="laptop">Laptop</option>
          {% endif %} {% if product.category == 'ipad' %}
          <option value="ipad" selected>iPad</option>
          {% else %}
          <option value="ipad">iPad</option>
          {% endif %} {% if product.category == 'audio' %}
          <option value="audio" selected>Tai nghe</option>
          {% else %}
          <option value="audio">Tai nghe</option>
          {% endif %} {% if product.category == 'accessory' %}
          <option value="accessory" selected>Phụ kiện</option>
          {% else %}
          <option value="accessory">Phụ kiện</option>
          {% endif %} {% if product.category == 'watch' %}
          <option value="watch" selected>Đồng hồ</option>
          {% else %}
          <option value="watch">Đồng hồ</option>
          {% endif %} {% if product.category == 'printer' %}
          <option value="printer" selected>Màn hình, Máy in</option>
          {% else %}
          <option value="printer">Màn hình, Máy in</option>
          {% endif %}
        </select>
      </div>

      <div class="admin-field">
        <label>Ảnh chính</label>
        <input name="main_image" value="{{ product.main_image }}" />
      </div>

      <div class="admin-field admin-field-full">
        <label>Danh sách phiên bản</label>
        <!-- prettier-ignore -->
        <textarea name="variants" rows="5" required>{{ product.variants_text }}</textarea>
      </div>

      <div class="admin-field admin-field-full">
        <label>Danh sách màu sắc</label>
        <!-- prettier-ignore -->
        <textarea name="colors" rows="6" required>{{ product.colors_text }}</textarea>
      </div>
    </div>

    <div class="admin-field admin-field-full">
      <label>Mô tả ngắn</label>
      <textarea name="description" rows="4">{{ product.description }}</textarea>
    </div>

    <div class="admin-form-actions">
      <button type="submit" class="admin-btn blue">Lưu thay đổi</button>
      <a href="/admin/products" class="admin-btn gray">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
