{% extends "base.html" %}

{% block content %}

<div class="breadcrumb">
    <a href="/" class="breadcrumb-home">Trang chủ</a>
    <span class="breadcrumb-separator">></span>
    <span class="breadcrumb-current">Đăng nhập</span>
</div>

<div class="signin-wrapper">

    <form class="signin-card" id="signinForm" method="POST" action="/signin" novalidate>

        <a href="/" class="back-btn">
            <img
                src="{{ url_for('static', filename='img/arrow-left.png') }}"
                class="back-arrow"
                alt="Back">
        </a>

        <h1 class="signin-title">Đăng nhập</h1>

        <p class="signin-subtitle">
            Chào mừng bạn đến với Technova
        </p>

        

        <div class="signin-group">
            <label>Số điện thoại hoặc Email</label>
            <input
                type="text"
                name="login_input"
                value="{{ request.form.get('login_input', '') }}"
                placeholder="Nhập số điện thoại hoặc email"
                tabindex="1">
        </div>

        <div class="signin-group">
            <label>Mật khẩu</label>

            <div class="password-box">
                <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Nhập mật khẩu"
                    tabindex="2">

                <img
                    id="togglePassword"
                    src="{{ url_for('static', filename='img/hide-eye.png') }}"
                    class="eye-icon"
                    role="button"
                    tabindex="3">
            </div>
        </div>

        <a href="/forgetpassword" class="forgot-password">
            Quên mật khẩu?
        </a>

        {% if error_message %}
        <div class="signin-error" id="signinError">
            <span>ⓘ</span>
            <p>{{ error_message }}</p>
        </div>
        {% endif %}

        <button type="submit" class="signin-btn" tabindex="5">
            Đăng nhập
        </button>

        <div class="signin-line"></div>

        <div class="signin-register">
            <span>Bạn chưa có tài khoản?</span>

            <a href="{{ url_for('signup') }}">
                Đăng ký ngay
            </a>
        </div>

    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const signinForm = document.getElementById("signinForm");
    const signinError = document.getElementById("signinError");
    const eyeBtn = document.getElementById("togglePassword");

    function forceSubmitSignin() {
        if (!signinForm) return;
        HTMLFormElement.prototype.submit.call(signinForm);
    }

    window.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;

        const activeElement = document.activeElement;

        if (!activeElement) return;

        if (activeElement.id === "togglePassword") {
            e.preventDefault();
            e.stopPropagation();
            activeElement.click();
            return;
        }

        if (e.key !== "Enter") return;

        if (activeElement.tagName === "TEXTAREA") {
            return;
        }

        if (activeElement.tagName === "A") {
            return;
        }

        if (activeElement.tagName === "BUTTON") {
            e.preventDefault();
            activeElement.click();
            return;
        }

        e.preventDefault();
        forceSubmitSignin();
    }, true);

    if (eyeBtn) {
        eyeBtn.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
                e.preventDefault();
                e.stopPropagation();
                eyeBtn.click();
            }
        });
    }

    if (signinError) {
        setTimeout(() => {
            signinError.style.opacity = "0";
            signinError.style.maxHeight = "0";
            signinError.style.marginBottom = "0";
            signinError.style.paddingTop = "0";
            signinError.style.paddingBottom = "0";
            signinError.style.overflow = "hidden";
            signinError.style.transition = "0.35s ease";

            setTimeout(() => {
                signinError.remove();
            }, 350);
        }, 3000);
    }
});
</script>

{% endblock %}
